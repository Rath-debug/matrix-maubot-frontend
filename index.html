<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Matrix Maubot Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-shell">
        <header class="hero">
            <p class="eyebrow">Matrix Maubot</p>
            <h1>Widget Dashboard</h1>
            <p class="subtitle">Pick a widget to interact with your bot backend.</p>
            <p class="subtitle" id="backend-target"></p>
        </header>

        <section id="widget-selector" class="widget-grid" aria-label="Widget picker">
            <button class="widget-card" data-widget="echo">Echo</button>
            <button class="widget-card" data-widget="reminder">Reminder</button>
        </section>

        <section id="widget-container" class="widget-panel" style="display: none;">
            <div class="panel-topbar">
                <button id="back-btn" class="btn btn-secondary" type="button">Back</button>
            </div>
            <div id="widget-content" class="panel-content"></div>
        </section>
    </main>

    <script src="api.js"></script>
    <script src="script.js"></script>
</body>
</html>
