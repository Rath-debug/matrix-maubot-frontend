<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reminder Widget</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .widget-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 25px;
            max-width: 400px;
            margin: 0 auto;
        }

        .widget-header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #f5576c;
            padding-bottom: 15px;
        }

        .widget-header h2 {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 5px;
        }

        .widget-header .icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .widget-header p {
            color: #999;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 0.95rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .time-input-group {
            display: flex;
            gap: 10px;
        }

        input[type="number"],
        input[type="text"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input[type="number"],
        select {
            width: auto;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #f5576c;
            background-color: #fff9fa;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .unit-select {
            flex: 0 0 auto;
            min-width: 100px;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(245, 87, 108, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status-message {
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-top: 15px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .status-message.show {
            display: block;
        }

        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status-message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .widget-status {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.85rem;
            color: #666;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
        }

        .status-indicator.connected {
            background-color: #28a745;
        }

        .status-indicator.disconnected {
            background-color: #dc3545;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 500px) {
            .widget-container {
                padding: 15px;
            }

            .widget-header h2 {
                font-size: 1.4rem;
            }

            button {
                padding: 12px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <div class="widget-header">
            <div class="icon">⏰</div>
            <h2>Create Reminder</h2>
            <p>Set a reminder in this room</p>
        </div>

        <form id="reminderForm">
            <div class="form-group">
                <label for="duration">When:</label>
                <div class="time-input-group">
                    <input
                        type="number"
                        id="duration"
                        name="duration"
                        min="1"
                        value="5"
                        placeholder="5"
                        required
                        style="flex: 1; width: auto;"
                    />
                    <select id="unit" name="unit" class="unit-select">
                        <option value="m">Minutes</option>
                        <option value="h">Hours</option>
                        <option value="d">Days</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="message">Reminder Message:</label>
                <textarea
                    id="message"
                    name="message"
                    placeholder="e.g., Take a break, drink water, or check emails..."
                    required
                ></textarea>
            </div>

            <button type="submit" id="submitBtn">📤 Set Reminder</button>

            <div id="statusMessage" class="status-message"></div>

            <div class="widget-status">
                <span class="status-indicator disconnected" id="statusIndicator"></span>
                <span id="statusText">Connecting to Matrix...</span>
            </div>
        </form>
    </div>
    <script>
    window.MATRIX_ACCESS_TOKEN = "mct_0mE0jCRpa15mGnszRoO9kOkTsuNDqg_0avSrz";
    </script>

    <script src="reminder-widget.js"></script>
</body>
</html>
