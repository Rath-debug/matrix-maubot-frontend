<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reminder Widget</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .widget-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 25px;
            max-width: 400px;
            margin: 0 auto;
        }

        .widget-header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #f5576c;
            padding-bottom: 15px;
        }

        .widget-header h2 {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 5px;
        }

        .widget-header .icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .widget-header p {
            color: #999;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 0.95rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .time-input-group {
            display: flex;
            gap: 10px;
        }

        input[type="number"],
        input[type="text"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input[type="number"],
        select {
            width: auto;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #f5576c;
            background-color: #fff9fa;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .unit-select {
            flex: 0 0 auto;
            min-width: 100px;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(245, 87, 108, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status-message {
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-top: 15px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .status-message.show {
            display: block;
        }

        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status-message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .widget-status {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.85rem;
            color: #666;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
        }

        .status-indicator.connected {
            background-color: #28a745;
        }

        .status-indicator.disconnected {
            background-color: #dc3545;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 500px) {
            .widget-container {
                padding: 15px;
            }

            .widget-header h2 {
                font-size: 1.4rem;
            }

            button {
                padding: 12px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <!-- TIMER WIDGET -->
    <div class="widget-container" style="margin-bottom: 32px;">
        <div class="widget-header">
            <div class="icon">⏱️</div>
            <h2>Timer</h2>
            <p>Set a countdown timer</p>
        </div>
        <form id="timerForm">
            <div class="form-group time-input-group" id="timerInputGroup">
                <div style="flex:1; text-align:center;">
                    <label for="timerHours">Hours</label>
                    <div class="stepper-group">
                        <button type="button" class="stepper-btn" data-target="timerHours" data-step="1">▲</button>
                        <div id="timerHoursDisplay" class="stepper-value">0</div>
                        <button type="button" class="stepper-btn" data-target="timerHours" data-step="-1">▼</button>
                    </div>
                </div>
                <div style="flex:1; text-align:center;">
                    <label for="timerMinutes">Minutes</label>
                    <div class="stepper-group">
                        <button type="button" class="stepper-btn" data-target="timerMinutes" data-step="1">▲</button>
                        <div id="timerMinutesDisplay" class="stepper-value">0</div>
                        <button type="button" class="stepper-btn" data-target="timerMinutes" data-step="-1">▼</button>
                    </div>
                </div>
                <div style="flex:1; text-align:center;">
                    <label for="timerSeconds">Seconds</label>
                    <div class="stepper-group">
                        <button type="button" class="stepper-btn" data-target="timerSeconds" data-step="1">▲</button>
                        <div id="timerSecondsDisplay" class="stepper-value">0</div>
                        <button type="button" class="stepper-btn" data-target="timerSeconds" data-step="-1">▼</button>
                    </div>
                </div>
            </div>
            <!-- Hidden real inputs for form compatibility -->
            <input type="hidden" id="timerHours" value="0" />
            <input type="hidden" id="timerMinutes" value="0" />
            <input type="hidden" id="timerSeconds" value="0" />
                <style>
                .stepper-group {
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    gap: 2px;
                }
                .stepper-btn {
                    background: #f5f6fa;
                    border: 1px solid #d1d5db;
                    border-radius: 4px;
                    width: 32px;
                    height: 28px;
                    font-size: 1.1em;
                    color: #f5576c;
                    cursor: pointer;
                    transition: background 0.2s;
                    user-select: none;
                }
                .stepper-btn:hover {
                    background: #f093fb22;
                }
                .stepper-value {
                    font-size: 1.3em;
                    font-weight: bold;
                    width: 32px;
                    text-align: center;
                    margin: 2px 0;
                    color: #333;
                }
                </style>
                <script>
                // Timer stepper logic
                document.addEventListener('DOMContentLoaded', function() {
                    function clamp(val, min, max) { return Math.max(min, Math.min(max, val)); }
                    const limits = { timerHours: [0, 23], timerMinutes: [0, 59], timerSeconds: [0, 59] };
                    const displays = {
                        timerHours: document.getElementById('timerHoursDisplay'),
                        timerMinutes: document.getElementById('timerMinutesDisplay'),
                        timerSeconds: document.getElementById('timerSecondsDisplay')
                    };
                    const inputs = {
                        timerHours: document.getElementById('timerHours'),
                        timerMinutes: document.getElementById('timerMinutes'),
                        timerSeconds: document.getElementById('timerSeconds')
                    };
                    function updateDisplay(target) {
                        displays[target].textContent = inputs[target].value;
                    }
                    document.querySelectorAll('.stepper-btn').forEach(btn => {
                        btn.addEventListener('click', function() {
                            const target = btn.getAttribute('data-target');
                            const step = parseInt(btn.getAttribute('data-step'), 10);
                            let val = parseInt(inputs[target].value, 10) || 0;
                            val = clamp(val + step, limits[target][0], limits[target][1]);
                            inputs[target].value = val;
                            updateDisplay(target);
                        });
                    });
                    // Initialize displays
                    Object.keys(displays).forEach(updateDisplay);
                });
                </script>
            <div class="form-group" id="timerSetBtnGroup">
                <button type="button" id="setTimerBtn" style="width:100%;background:#f5576c;color:#fff;">Set Timer</button>
            </div>
            <div class="form-group" id="timerCountdownGroup" style="display:none;text-align:center;">
                <div id="timerLiveCountdown" style="font-size:2em;color:#f5576c;font-family:monospace;">00:00:00</div>
                <button type="button" id="resetTimerBtn" style="margin-top:10px;width:100px;background:#eee;color:#f5576c;">Reset</button>
            </div>
            <div class="form-group">
                <label for="timerMessage">Message:</label>
                <input type="text" id="timerMessage" name="timerMessage" placeholder="e.g., Great job! Take a break ☕" maxlength="120" style="width:100%;" />
            </div>
            <!-- Start button removed, replaced by Set Timer above. Countdown display moved above. -->
        </form>
        <div style="text-align:center; color:#888; font-size:0.95em; margin-top:10px;">Try adding a message to motivate yourself when the timer ends!</div>
    </div>

    <div class="main-layout">
        <!-- Sidebar with Quick Commands -->
        <aside class="sidebar">
            <div class="sidebar-header">Quick Commands</div>
            <div id="commandButtons" class="sidebar-commands">
                <button type="button" class="cmd-btn" data-cmd="!remind help">Help</button>
                <button type="button" class="cmd-btn" data-cmd="!remind list">List</button>
                <button type="button" class="cmd-btn" data-cmd="!remind locales">Locales</button>
                <button type="button" class="cmd-btn" data-cmd="!remind locale">Locale</button>
                <button type="button" class="cmd-btn" data-cmd="!remind timezone">Timezone</button>
                <button type="button" class="cmd-btn" data-cmd="!remind for">For</button>
                <button type="button" class="cmd-btn" data-cmd="!remind reschedule">Reschedule</button>
            </div>
        </aside>
        <!-- SCHEDULED REMINDER WIDGET -->
        <div class="widget-container">
            <!-- Circular Countdown Timer at the top -->
            <div id="timerContainer" style="display:flex; justify-content:center; align-items:center; margin: 24px 0;">
                <svg id="countdownTimer" width="120" height="120" viewBox="0 0 120 120">
                    <circle cx="60" cy="60" r="54" stroke="#e0e0e0" stroke-width="12" fill="none"/>
                    <circle id="timerArc" cx="60" cy="60" r="54" stroke="#f5576c" stroke-width="12" fill="none" stroke-linecap="round" stroke-dasharray="339.292" stroke-dashoffset="0"/>
                    <text id="timerText" x="60" y="68" text-anchor="middle" font-size="2rem" fill="#333" font-family="inherit">00:00:00</text>
                </svg>
            </div>
            <div class="widget-header">
                <div class="icon">⏰</div>
                <h2>Create Reminder</h2>
                <p>Set a reminder in this room</p>
            </div>

            <form id="reminderForm">
                <div class="form-group">
                    <label for="remindDateTime">When:</label>
                    <input
                        type="datetime-local"
                        id="remindDateTime"
                        name="remindDateTime"
                        required
                        style="width: 100%;"
                    />
                </div>

                <div class="form-group">
                    <label for="message">Reminder Message:</label>
                    <textarea
                        id="message"
                        name="message"
                        placeholder="e.g., Take a break, drink water, or check emails..."
                        required
                    ></textarea>
                </div>

                <button type="submit" id="submitBtn">📤 Set Reminder</button>
                <div id="statusMessage" class="status-message"></div>

                <!-- Upcoming Reminders List -->
                <div id="reminderListContainer" style="margin-top: 24px;">
                    <label style="font-weight:600; color:#333;">Upcoming Reminders</label>
                    <ul id="reminderList" style="list-style:none; padding:0; margin:10px 0 0 0;"></ul>
                </div>


                <div class="widget-status">
                    <span class="status-indicator disconnected" id="statusIndicator"></span>
                    <span id="statusText">Connecting to Matrix...</span>
                </div>
            </form>
        </div>
    </div>
        <style>
        .main-layout {
            display: flex;
            gap: 24px;
            align-items: flex-start;
            justify-content: center;
            margin-bottom: 32px;
        }
        .sidebar {
            min-width: 160px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            padding: 18px 12px 18px 12px;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            height: fit-content;
        }
        .sidebar-header {
            font-weight: bold;
            color: #f5576c;
            margin-bottom: 12px;
            text-align: center;
            font-size: 1.1em;
        }
        .sidebar-commands {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .sidebar-commands .cmd-btn {
            background: #f5f6fa;
            color: #f5576c;
            border: 1px solid #f093fb44;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 500;
            padding: 8px 0;
            transition: background 0.2s, color 0.2s;
            cursor: pointer;
        }
        .sidebar-commands .cmd-btn:hover {
            background: #f093fb22;
            color: #d81b60;
        }
        @media (max-width: 900px) {
            .main-layout {
                flex-direction: column;
                gap: 0;
            }
            .sidebar {
                flex-direction: row;
                min-width: 0;
                width: 100%;
                margin-bottom: 18px;
                justify-content: center;
                align-items: center;
                box-shadow: none;
                border-radius: 8px;
                padding: 10px 0 10px 0;
            }
            .sidebar-header {
                display: none;
            }
            .sidebar-commands {
                flex-direction: row;
                gap: 8px;
                width: 100%;
                justify-content: center;
            }
        }
        </style>

    </script>

    <script src="reminder-widget-v2.js"></script>
    <!-- Timer logic is now handled in reminder-widget-v2.js -->
    <style>
    /* Modern calendar input style (macOS/Microsoft inspired) */
    input[type="datetime-local"] {
        background: #f5f6fa;
        border: 1.5px solid #d1d5db;
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 1rem;
        color: #333;
        box-shadow: 0 1px 2px rgba(0,0,0,0.03);
        transition: border-color 0.2s;
    }
    input[type="datetime-local"]:focus {
        border-color: #f5576c;
        background: #fff9fa;
    }
    /* Hide spinner for datetime-local on Chrome */
    input[type="datetime-local"]::-webkit-inner-spin-button,
    input[type="datetime-local"]::-webkit-calendar-picker-indicator {
        filter: invert(0.5) sepia(1) saturate(5) hue-rotate(-20deg);
    }
    </style>
</body>
</html>
