<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reminder Widget</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 20px;
        }

        :root {
            --brand:     #ff4d6d;
            --brand-2:   #ff85a1;
            --bg:        #0f0f12;
            --surface:   #18181f;
            --surface-2: #22222c;
            --border:    #2e2e3a;
            --text:      #f0f0f5;
            --muted:     #7a7a95;
            --success:   #34d399;
            --error:     #f87171;
            --info:      #60a5fa;
            --radius:    16px;
            --mono:      'DM Mono', monospace;
            --sans:      'DM Sans', sans-serif;
            --transition: 0.2s cubic-bezier(.4,0,.2,1);
        }

        .timer-card, .widget-container, .reminder-card, .sidebar {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            box-shadow: 0 6px 32px 0 rgba(0,0,0,0.18);
            padding: 28px 28px 22px 28px;
            margin-bottom: 0;
        }

        .widget-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 25px;
            max-width: 400px;
            margin: 0 auto;
        }

        .widget-header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #f5576c;
            padding-bottom: 15px;
        }

        .widget-header h2 {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 5px;
        }

        .widget-header .icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .widget-header p {
            color: #999;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 0.95rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .time-input-group {
            display: flex;
            gap: 10px;
        }

        input[type="number"],
        input[type="text"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input[type="number"],
        select {
            width: auto;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #f5576c;
            background-color: #fff9fa;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .unit-select {
            flex: 0 0 auto;
            min-width: 100px;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(245, 87, 108, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status-message {
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-top: 15px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .status-message.show {
            display: block;
        }

        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status-message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .widget-status {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.85rem;
            color: #666;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
        }

        .widget-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .widget-section-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
            letter-spacing: 0.01em;
        }

        .stepper-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .stepper-btn {
            background: #f5f6fa;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            width: 32px;
            height: 28px;
            font-size: 1.1em;
            color: #f5576c;
            cursor: pointer;
            transition: background 0.2s;
            user-select: none;
        }

        .stepper-btn:hover {
            background: #f093fb22;
        }

        .stepper-value {
            font-size: 1.3em;
            font-weight: bold;
            width: 32px;
            text-align: center;
            margin: 2px 0;
            color: #333;
        }

        #timerLiveCountdown {
            font-size: 2em;
            color: #f5576c;
            font-family: monospace;
            letter-spacing: 0.04em;
        }

        .status-indicator.connected {
            background-color: #28a745;
        }

        .status-indicator.disconnected {
            background-color: #dc3545;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 500px) {
            .widget-container {
                padding: 15px;
            }

            .widget-header h2 {
                font-size: 1.4rem;
            }

            button {
                padding: 12px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
        <div class="main-layout">
            <!-- Sidebar with Quick Commands -->
            <aside class="sidebar">
                <div class="sidebar-header">Quick Commands</div>
                <div id="commandButtons" class="sidebar-commands">
                    <button type="button" class="cmd-btn" data-cmd="!remind help">Help</button>
                    <button type="button" class="cmd-btn" data-cmd="!remind list">List</button>
                    <button type="button" class="cmd-btn" data-cmd="!remind locales">Locales</button>
                    <button type="button" class="cmd-btn" data-cmd="!remind locale">Locale</button>
                    <button type="button" class="cmd-btn" data-cmd="!remind timezone">Timezone</button>
                    <button type="button" class="cmd-btn" data-cmd="!remind for">For</button>
                    <button type="button" class="cmd-btn" data-cmd="!remind reschedule">Reschedule</button>
                </div>
            </aside>
            <div style="flex:1;min-width:0;">
                <div class="widget-grid">
                    <!-- TIMER SETUP WIDGET -->
                    <div class="widget-container">
                        <div class="widget-header">
                            <h2>Timer Setup</h2>
                            <p>Configure your countdown duration</p>
                        </div>
                        <form id="timerForm">
                            <div class="form-group time-input-group" id="timerInputGroup">
                                <div style="flex:1; text-align:center;">
                                    <label for="timerHours">Hours</label>
                                    <div class="stepper-group">
                                        <button type="button" class="stepper-btn" data-target="timerHours" data-step="1">▲</button>
                                        <div id="timerHoursDisplay" class="stepper-value">0</div>
                                        <button type="button" class="stepper-btn" data-target="timerHours" data-step="-1">▼</button>
                                    </div>
                                </div>
                                <div style="flex:1; text-align:center;">
                                    <label for="timerMinutes">Minutes</label>
                                    <div class="stepper-group">
                                        <button type="button" class="stepper-btn" data-target="timerMinutes" data-step="1">▲</button>
                                        <div id="timerMinutesDisplay" class="stepper-value">0</div>
                                        <button type="button" class="stepper-btn" data-target="timerMinutes" data-step="-1">▼</button>
                                    </div>
                                </div>
                                <div style="flex:1; text-align:center;">
                                    <label for="timerSeconds">Seconds</label>
                                    <div class="stepper-group">
                                        <button type="button" class="stepper-btn" data-target="timerSeconds" data-step="1">▲</button>
                                        <div id="timerSecondsDisplay" class="stepper-value">0</div>
                                        <button type="button" class="stepper-btn" data-target="timerSeconds" data-step="-1">▼</button>
                                    </div>
                                </div>
                            </div>
                            <input type="hidden" id="timerHours" value="0" />
                            <input type="hidden" id="timerMinutes" value="0" />
                            <input type="hidden" id="timerSeconds" value="0" />
                            <div class="form-group">
                                <label for="timerMessage">Message:</label>
                                <input type="text" id="timerMessage" name="timerMessage" placeholder="e.g., Great job! Take a break ☕" maxlength="120" style="width:100%;" />
                            </div>
                            <div class="form-group" id="timerSetBtnGroup">
                                <button type="button" id="setTimerBtn" style="width:100%;background:#f5576c;color:#fff;">Set Timer</button>
                            </div>
                        </form>
                        <div style="text-align:center; color:#888; font-size:0.95em; margin-top:10px;">Try adding a message to motivate yourself when the timer ends!</div>
                    </div>

                    <!-- COUNTDOWN WIDGET -->
                    <div class="widget-container" id="timerCountdownPanel" style="display:none;">
                        <div class="widget-header">
                            <h2>Countdown</h2>
                            <p>Live timer until completion</p>
                        </div>
                        <div class="form-group" id="timerCountdownGroup" style="display:none;text-align:center;">
                            <div id="timerLiveCountdown">00:00:00</div>
                            <button type="button" id="resetTimerBtn" style="margin-top:10px;width:100px;background:#eee;color:#f5576c;">Reset</button>
                        </div>
                    </div>

                    <!-- SCHEDULED REMINDER WIDGET (Calendar Style) -->
                    <div class="widget-container">
            <div class="widget-header">
                <h2>Calendar Reminder</h2>
                <p>Pick a date, set a time and message</p>
            </div>
            <div id="calendarReminder">
                <div id="calendarNav" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
                    <button type="button" id="prevMonth" style="background:none;border:none;font-size:1.3em;cursor:pointer;color:#f5576c;">&#8592;</button>
                    <span id="calendarMonthLabel" style="font-weight:600;font-size:1.1em;color:#333;"></span>
                    <button type="button" id="nextMonth" style="background:none;border:none;font-size:1.3em;cursor:pointer;color:#f5576c;">&#8594;</button>
                </div>
                <table id="calendarTable" style="width:100%;border-collapse:collapse;margin-bottom:18px;"></table>
                <form id="calendarReminderForm">
                    <div class="form-group">
                        <label for="calendarSelectedDate">Date:</label>
                        <input type="text" id="calendarSelectedDate" name="calendarSelectedDate" readonly style="background:#f5f6fa;cursor:not-allowed;" required />
                    </div>
                    <div class="form-group" style="display:flex;gap:10px;">
                        <div style="flex:1;">
                            <label for="calendarTime">Time:</label>
                            <input type="time" id="calendarTime" name="calendarTime" required style="width:100%;" />
                        </div>
                        <div style="flex:2;">
                            <label for="calendarMessage">Message:</label>
                            <input type="text" id="calendarMessage" name="calendarMessage" placeholder="e.g., Meeting, break, call..." maxlength="120" required />
                        </div>
                    </div>
                    <button type="submit" id="calendarSetReminderBtn">Set Reminder</button>
                </form>
                <div id="calendarStatusMessage" class="status-message"></div>
                <div id="calendarUpcoming" style="margin-top:24px;">
                    <label style="font-weight:600;color:#333;">Calendar Countdowns</label>
                    <ul id="calendarReminderList" style="list-style:none;padding:0;margin:10px 0 0 0;"></ul>
                </div>
                    </div>

                    <div class="widget-container">
                        <div class="widget-header">
                            <h2>Unified Upcoming</h2>
                            <p>Timer + calendar countdowns</p>
                        </div>
                        <ul id="unifiedUpcomingList" style="list-style:none;padding:0;margin:0;"></ul>
                    </div>
                </div>
            </div>
        <!-- Calendar logic is now handled in reminder-widget-v2.js -->
            </div>
        </div>
    <script>
    // Timer stepper logic
    document.addEventListener('DOMContentLoaded', function() {
        function clamp(val, min, max) { return Math.max(min, Math.min(max, val)); }
        const limits = { timerHours: [0, 23], timerMinutes: [0, 59], timerSeconds: [0, 59] };
        const displays = {
            timerHours: document.getElementById('timerHoursDisplay'),
            timerMinutes: document.getElementById('timerMinutesDisplay'),
            timerSeconds: document.getElementById('timerSecondsDisplay')
        };
        const inputs = {
            timerHours: document.getElementById('timerHours'),
            timerMinutes: document.getElementById('timerMinutes'),
            timerSeconds: document.getElementById('timerSeconds')
        };
        function updateDisplay(target) {
            if (displays[target] && inputs[target]) {
                displays[target].textContent = inputs[target].value;
            }
        }
        document.querySelectorAll('.stepper-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const target = btn.getAttribute('data-target');
                const step = parseInt(btn.getAttribute('data-step'), 10);
                let val = parseInt(inputs[target].value, 10) || 0;
                val = clamp(val + step, limits[target][0], limits[target][1]);
                inputs[target].value = val;
                updateDisplay(target);
            });
        });
        Object.keys(displays).forEach(updateDisplay);
    });
    </script>
        <style>
                .main-layout {
                    display: flex;
                    gap: 24px;
                    align-items: flex-start;
                    justify-content: center;
                    margin-bottom: 32px;
                }
                .sidebar {
                    min-width: 160px;
                    max-width: 220px;
                    box-shadow: 0 4px 24px 0 rgba(0,0,0,0.13);
                    padding: 18px 12px 18px 12px;
                    display: flex;
                    flex-direction: column;
                    gap: 8px;
                    position: sticky;
                    top: 20px;
                }
                .sidebar-header {
                    font-weight: bold;
                    color: #f5576c;
                    margin-bottom: 12px;
                    text-align: center;
                    font-size: 1.1em;
                }
                .sidebar-commands {
                    display: flex;
                    flex-direction: column;
                    gap: 8px;
                }
                .sidebar-commands .cmd-btn {
                    background: var(--surface-2);
                    color: var(--brand);
                    border: 1.5px solid var(--border);
                    border-radius: 8px;
                    font-family: var(--mono);
                    font-size: 0.85rem;
                    letter-spacing: 0.04em;
                    padding: 11px 12px 11px 12px;
                    text-align: left;
                    cursor: pointer;
                    display: flex;
                    align-items: center;
                    gap: 10px;
                    transition: color var(--transition), border-color var(--transition), background var(--transition);
                    overflow: hidden;
                    min-height: 38px;
                    box-shadow: 0 2px 8px 0 rgba(0,0,0,0.07);
                }
                .sidebar-commands .cmd-btn:hover, .sidebar-commands .cmd-btn:focus {
                    color: #fff;
                    border-color: var(--brand);
                    background: var(--brand);
                    outline: none;
                }

                .cal-day.selected {
                    background: var(--brand);
                    color: #fff;
                    font-weight: 600;
                    box-shadow: 0 2px 8px 0 rgba(255,77,109,0.18);
                    border: 2px solid #fff2;
                }

                .cal-day.has-reminder::before {
                    content: '';
                    position: absolute; top: 3px; right: 3px;
                    width: 6px; height: 6px;
                    border-radius: 50%;
                    background: var(--brand-2);
                    box-shadow: 0 0 4px 1px #ff4d6d44;
                }

                .btn-primary {
                    background: var(--brand);
                    color: #fff;
                    box-shadow: 0 2px 12px 0 rgba(255,77,109,0.13);
                }
                .btn-primary:hover, .btn-primary:focus {
                    background: #e63659;
                    color: #fff;
                    transform: translateY(-1px);
                    outline: none;
                }
                .btn-primary:active { transform: translateY(0); }
                .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
                @media (max-width: 900px) {
                    .main-layout {
                        flex-direction: column;
                        gap: 0;
                    }
                    .sidebar {
                        width: 100%;
                        min-width: 0;
                        max-width: 100%;
                        margin-bottom: 18px;
                        border-radius: 8px;
                        box-shadow: none;
                        padding: 10px 0;
                        align-items: center;
                        justify-content: center;
                    }
                    .sidebar-header {
                        display: none;
                    }
                    .sidebar-commands {
                        flex-direction: row;
                        flex-wrap: wrap;
                        gap: 8px;
                        width: 100%;
                        justify-content: center;
                    }
                    .sidebar-commands .cmd-btn {
                        flex: 1 1 120px;
                        min-width: 90px;
                        margin: 2px 0;
                    }
                }
                @media (max-width: 600px) {
                    .sidebar-commands .cmd-btn {
                        flex: 1 1 100px;
                        min-width: 80px;
                        font-size: 0.95em;
                        padding: 7px 0;
                    }
                    .sidebar {
                        padding: 8px 0;
                    }
                }
        </style>

    <style>
    /* Modern calendar input style (macOS/Microsoft inspired) */
    input[type="datetime-local"] {
        background: #f5f6fa;
        border: 1.5px solid #d1d5db;
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 1rem;
        color: #333;
        box-shadow: 0 1px 2px rgba(0,0,0,0.03);
        transition: border-color 0.2s;
    }
    input[type="datetime-local"]:focus {
        border-color: #f5576c;
        background: #fff9fa;
    }
    /* Hide spinner for datetime-local on Chrome */
    input[type="datetime-local"]::-webkit-inner-spin-button,
    input[type="datetime-local"]::-webkit-calendar-picker-indicator {
        filter: invert(0.5) sepia(1) saturate(5) hue-rotate(-20deg);
    }
