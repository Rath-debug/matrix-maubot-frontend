<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reminder Widget</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .widget-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 25px;
            max-width: 400px;
            margin: 0 auto;
        }

        .widget-header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #f5576c;
            padding-bottom: 15px;
        }

        .widget-header h2 {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 5px;
        }

        .widget-header .icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .widget-header p {
            color: #999;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 0.95rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .time-input-group {
            display: flex;
            gap: 10px;
        }

        input[type="number"],
        input[type="text"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input[type="number"],
        select {
            width: auto;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #f5576c;
            background-color: #fff9fa;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .unit-select {
            flex: 0 0 auto;
            min-width: 100px;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(245, 87, 108, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status-message {
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-top: 15px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .status-message.show {
            display: block;
        }

        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status-message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .widget-status {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.85rem;
            color: #666;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
        }

        .status-indicator.connected {
            background-color: #28a745;
        }

        .status-indicator.disconnected {
            background-color: #dc3545;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 500px) {
            .widget-container {
                padding: 15px;
            }

            .widget-header h2 {
                font-size: 1.4rem;
            }

            button {
                padding: 12px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <!-- TIMER WIDGET -->
    <div class="widget-container" style="margin-bottom: 32px;">
        <div class="widget-header">
            <div class="icon">⏱️</div>
            <h2>Quick Timer</h2>
            <p>Set a countdown timer (hours, minutes, seconds)</p>
        </div>
        <form id="timerForm">
            <div class="form-group time-input-group">
                <div style="flex:1;">
                    <label for="timerHours">Hours</label>
                    <input type="number" id="timerHours" min="0" max="23" value="0" style="width:100%;" />
                </div>
                <div style="flex:1;">
                    <label for="timerMinutes">Minutes</label>
                    <input type="number" id="timerMinutes" min="0" max="59" value="0" style="width:100%;" />
                </div>
                <div style="flex:1;">
                    <label for="timerSeconds">Seconds</label>
                    <input type="number" id="timerSeconds" min="0" max="59" value="0" style="width:100%;" />
                </div>
            </div>
            <button type="submit" id="timerStartBtn">▶️ Start Timer</button>
            <div id="timerCountdownDisplay" style="text-align:center; font-size:1.5em; margin:16px 0; color:#f5576c; font-family:monospace;">00:00:00</div>
        </form>
    </div>

    <!-- SCHEDULED REMINDER WIDGET -->
    <div class="widget-container">
        <!-- Circular Countdown Timer at the top -->
        <div id="timerContainer" style="display:flex; justify-content:center; align-items:center; margin: 24px 0;">
            <svg id="countdownTimer" width="120" height="120" viewBox="0 0 120 120">
                <circle cx="60" cy="60" r="54" stroke="#e0e0e0" stroke-width="12" fill="none"/>
                <circle id="timerArc" cx="60" cy="60" r="54" stroke="#f5576c" stroke-width="12" fill="none" stroke-linecap="round" stroke-dasharray="339.292" stroke-dashoffset="0"/>
                <text id="timerText" x="60" y="68" text-anchor="middle" font-size="2rem" fill="#333" font-family="inherit">00:00:00</text>
            </svg>
        </div>
        <div class="widget-header">
            <div class="icon">⏰</div>
            <h2>Create Reminder</h2>
            <p>Set a reminder in this room</p>
        </div>

        <form id="reminderForm">
            <div class="form-group">
                <label for="remindDateTime">When:</label>
                <input
                    type="datetime-local"
                    id="remindDateTime"
                    name="remindDateTime"
                    required
                    style="width: 100%;"
                />
            </div>

            <div class="form-group">
                <label for="message">Reminder Message:</label>
                <textarea
                    id="message"
                    name="message"
                    placeholder="e.g., Take a break, drink water, or check emails..."
                    required
                ></textarea>
            </div>

            <button type="submit" id="submitBtn">📤 Set Reminder</button>

            <div class="form-group" style="margin-top: 24px;">
                <label>Quick Commands:</label>
                <div id="commandButtons" style="display: flex; flex-wrap: wrap; gap: 8px;">
                    <button type="button" class="cmd-btn" data-cmd="!remind help">Help</button>
                    <button type="button" class="cmd-btn" data-cmd="!remind list">List</button>
                    <button type="button" class="cmd-btn" data-cmd="!remind locales">Locales</button>
                    <button type="button" class="cmd-btn" data-cmd="!remind locale">Locale</button>
                    <button type="button" class="cmd-btn" data-cmd="!remind timezone">Timezone</button>
                    <button type="button" class="cmd-btn" data-cmd="!remind for">For</button>
                    <button type="button" class="cmd-btn" data-cmd="!remind reschedule">Reschedule</button>
                </div>
            </div>


            <div id="statusMessage" class="status-message"></div>

            <!-- Upcoming Reminders List -->
            <div id="reminderListContainer" style="margin-top: 24px;">
                <label style="font-weight:600; color:#333;">Upcoming Reminders</label>
                <ul id="reminderList" style="list-style:none; padding:0; margin:10px 0 0 0;"></ul>
            </div>


            <div class="widget-status">
                <span class="status-indicator disconnected" id="statusIndicator"></span>
                <span id="statusText">Connecting to Matrix...</span>
            </div>
        </form>
    </div>
    <script>
    window.MATRIX_ACCESS_TOKEN = "mct_0mE0jCRpa15mGnszRoO9kOkTsuNDqg_0avSrz";
    </script>

    <script src="reminder-widget-v2.js"></script>
    <script>
    // TIMER WIDGET LOGIC
    let timerWidgetInterval = null;
    document.addEventListener("DOMContentLoaded", function() {
        const timerForm = document.getElementById("timerForm");
        const timerDisplay = document.getElementById("timerCountdownDisplay");
        let timerTotal = 0;
        let timerLeft = 0;
        let timerRunning = false;

        timerForm.addEventListener("submit", function(e) {
            e.preventDefault();
            const h = parseInt(document.getElementById("timerHours").value, 10) || 0;
            const m = parseInt(document.getElementById("timerMinutes").value, 10) || 0;
            const s = parseInt(document.getElementById("timerSeconds").value, 10) || 0;
            timerTotal = h * 3600 + m * 60 + s;
            timerLeft = timerTotal;
            if (timerTotal <= 0) {
                timerDisplay.textContent = "00:00:00";
                return;
            }
            timerRunning = true;
            timerDisplay.textContent = formatTimer(timerLeft);
            if (timerWidgetInterval) clearInterval(timerWidgetInterval);
            timerWidgetInterval = setInterval(async function() {
                timerLeft--;
                if (timerLeft <= 0) {
                    timerDisplay.textContent = "00:00:00";
                    clearInterval(timerWidgetInterval);
                    timerRunning = false;
                    // Send message to Matrix room
                    try {
                        await window.sendCommandToMatrix && window.sendCommandToMatrix(`!remind for 0s Timer finished!`);
                    } catch (err) {
                        // ignore
                    }
                } else {
                    timerDisplay.textContent = formatTimer(timerLeft);
                }
            }, 1000);
        });

        function formatTimer(sec) {
            const h = String(Math.floor(sec / 3600)).padStart(2, '0');
            const m = String(Math.floor((sec % 3600) / 60)).padStart(2, '0');
            const s = String(sec % 60).padStart(2, '0');
            return `${h}:${m}:${s}`;
        }
    });
    </script>
    <style>
    /* Modern calendar input style (macOS/Microsoft inspired) */
    input[type="datetime-local"] {
        background: #f5f6fa;
        border: 1.5px solid #d1d5db;
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 1rem;
        color: #333;
        box-shadow: 0 1px 2px rgba(0,0,0,0.03);
        transition: border-color 0.2s;
    }
    input[type="datetime-local"]:focus {
        border-color: #f5576c;
        background: #fff9fa;
    }
    /* Hide spinner for datetime-local on Chrome */
    input[type="datetime-local"]::-webkit-inner-spin-button,
    input[type="datetime-local"]::-webkit-calendar-picker-indicator {
        filter: invert(0.5) sepia(1) saturate(5) hue-rotate(-20deg);
    }
    </style>
</body>
</html>
